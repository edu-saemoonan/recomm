<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>양육 훈련 추천</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: #f5f5f0;
    color: #222;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header .cross-icon { font-size: 32px; display: block; margin-bottom: 10px; }
  .header .church-name { font-size: 13px; color: #888; margin-bottom: 6px; }
  .header h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
  .header p { font-size: 14px; color: #666; line-height: 1.6; }

  .card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 14px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }

  .form-group { margin-bottom: 12px; }
  .form-group:last-child { margin-bottom: 0; }

  label {
    font-size: 12px;
    color: #555;
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
  }
  label .opt { font-weight: 400; color: #bbb; }

  input[type="text"],
  select,
  textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    color: #222;
    background: #fafafa;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
    line-height: 1.6;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #5b4fcf;
    background: #fff;
  }
  textarea { resize: vertical; }

  /* 과정 목록 힌트 박스 */
  .course-hint {
    background: #f8f7ff;
    border: 1px solid #e0dcfc;
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-top: 10px;
  }
  .course-hint-title {
    font-size: 12px;
    font-weight: 700;
    color: #5b4fcf;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .course-hint details { margin-bottom: 6px; }
  .course-hint summary {
    font-size: 12px;
    font-weight: 600;
    color: #444;
    cursor: pointer;
    user-select: none;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 3px 0;
  }
  .course-hint summary::-webkit-details-marker { display: none; }
  .course-hint summary::before {
    content: '▶';
    font-size: 9px;
    color: #999;
    transition: transform .15s;
  }
  .course-hint details[open] summary::before { transform: rotate(90deg); }
  .course-hint ul {
    margin: 6px 0 4px 16px;
    padding: 0;
  }
  .course-hint ul li {
    font-size: 12px;
    color: #666;
    margin-bottom: 3px;
    list-style: disc;
    cursor: pointer;
    transition: color .1s;
  }
  .course-hint ul li:hover { color: #5b4fcf; text-decoration: underline; }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: #2e1fa3;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, transform .1s;
    margin-top: 0.5rem;
  }
  .btn-submit:hover { background: #3d2fbe; }
  .btn-submit:active { transform: scale(0.99); }
  .btn-submit:disabled { background: #bbb; cursor: not-allowed; }

  .result-card {
    display: none;
    background: #fff;
    border: 1.5px solid #5b4fcf;
    border-radius: 14px;
    padding: 1.5rem;
    margin-top: 1.5rem;
  }
  .result-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #f0eeff;
  }
  .result-icon { font-size: 22px; }
  .result-title { font-size: 16px; font-weight: 700; color: #2e1fa3; }
  .result-body { font-size: 14px; color: #333; line-height: 1.9; }
  .result-body strong { color: #2e1fa3; font-weight: 700; }
  
  .rank-block {
    background: #f8f7ff;
    border-left: 3px solid #5b4fcf;
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    margin: 10px 0;
  }
  .encourage-block {
    background: #fffbea;
    border-left: 3px solid #f5c842;
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    margin: 10px 0;
  }

  .error-box {
    display: none;
    background: #fff5f5;
    border: 1px solid #ffcccc;
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 1rem;
    font-size: 13px;
    color: #c0392b;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  .footer {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 12px;
    color: #bbb;
  }

  .char-count {
    text-align: right;
    font-size: 11px;
    color: #bbb;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="container">

  <!-- 헤더 -->
  <div class="header">
    <span class="cross-icon">✝️</span>
    <p class="church-name">새문안교회 양육훈련부</p>
    <h1>양육 훈련 맞춤 추천</h1>
  </div>
  
    <!-- 관심사 -->
  <div class="card">
    <p class="card-title">✅ 관심사</p>
    <div class="form-group">
      <textarea id="inp-need" rows="4"
        placeholder="크리스찬 교육·양육 관련하여 관심있는 부분을 기입해 주세요."
        ></textarea>
    </div>
  </div>

  <!-- 제출 버튼 -->
  <button class="btn-submit" id="btn-submit" onclick="recommend()">
    ✨ 훈련 추천받기
  </button>

  <div class="error-box" id="error-area"></div>

  <!-- 결과 카드 -->
  <div class="result-card" id="result-area">
    <div class="result-header">
      <span class="result-icon">📖</span>
      <span class="result-title" id="result-title">맞춤 훈련 추천 결과</span>
    </div>
    <div class="result-body" id="result-body"></div>
  </div>

  <div class="footer">
    새문안교회 양육훈련부 | powered by Google Gemini AI
  </div>
</div>

<script>

function showError(msg) {
  const el = document.getElementById('error-area');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-area').style.display = 'none';
}

function formatResult(text) {
  let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  const lines = html.split('\n');
  let result = '';
  let inRank = false;
  let inEncourage = false;
  let blockContent = '';

  lines.forEach(line => {
    const t = line.trim();
    if (/^(🌟|📖|✨)/.test(t)) {
      if (inRank)     result += `<div class="rank-block">${blockContent}</div>`;
      if (inEncourage) result += `<div class="encourage-block">${blockContent}</div>`;
      inRank = true; inEncourage = false;
      blockContent = t + '<br>';
    } else if (/^💬/.test(t)) {
      if (inRank)     result += `<div class="rank-block">${blockContent}</div>`;
      if (inEncourage) result += `<div class="encourage-block">${blockContent}</div>`;
      inRank = false; inEncourage = true;
      blockContent = t + '<br>';
    } else if (t === '') {
      if (inRank || inEncourage) blockContent += '<br>';
      else result += '<br>';
    } else {
      if (inRank || inEncourage) blockContent += t + '<br>';
      else result += t + '<br>';
    }
  });

  if (inRank)     result += `<div class="rank-block">${blockContent}</div>`;
  if (inEncourage) result += `<div class="encourage-block">${blockContent}</div>`;
  return result;
}

// ═══════════════════════════════════════════════════════════
// API Key 설정 (전역 선언 - 버튼 클릭 간 키 사용 기록 유지)
// aistudio.google.com → Get API Key → Create API key
// ═══════════════════════════════════════════════════════════
const API_KEYS = [
  "AQ.Ab8RN6LVJhhGfXoHBXMKIap-JCfVNdpN3oNgw7N1XIKCrnQ_Zw",
  "AQ.Ab8RN6IcHVJzJqZT1my3bVru1Ebcelz5mHyXUJHk1qwuZheoyw",
  "AQ.Ab8RN6IORFl-1vByI4Wukq_DxLYUzAoR_5TAxV1Z_kThpnRINg",
  "AQ.Ab8RN6L8I-eSfQrKY3QHLU5zzejXT8fSlKXeLcXSV02L8Vdb6w",
  "AQ.Ab8RN6L29jbTGi7gaasgBA35Lfal663PeSnwFe3cowZi2UlNkg",
  "AQ.Ab8RN6IfFBLTHCByT6NOK4vM913O69HpajRxGxibSRrKg1upKw",
  "AQ.Ab8RN6K2wvkoDH3Sp7Rpv0WNp8YL9_pRmWxXllKNwHBxc72W4A",
  
  
];

// ── Rate Limit 관리 (전역 유지) ──────────────────────────────
const keyLastUsed   = {};   // { key: timestamp }
const keyUsageCount = {};   // { key: 오늘 사용 횟수 }
const MIN_INTERVAL_MS = 4000; // 같은 키 연속 사용 최소 간격 4초 (RPM 15 기준)

async function recommend() {
  hideError();
  const btn = document.getElementById('btn-submit');
  if (btn.disabled) return;

  function getAvailableKey() {
    const now = Date.now();
    // 미입력 키 제거
    const validKeys = API_KEYS.filter(k => !k.startsWith('여기에'));
    // 가장 오래 전에 사용된 키 선택 (Round Robin 효과)
    let bestKey = null;
    let oldestTime = Infinity;
    for (const k of validKeys) {
      const last = keyLastUsed[k] || 0;
      if (last < oldestTime) {
        oldestTime = last;
        bestKey = k;
      }
    }
    return bestKey;
  }

  function markKeyUsed(key) {
    keyLastUsed[key] = Date.now();
    keyUsageCount[key] = (keyUsageCount[key] || 0) + 1;
  }

  // 요청 큐 (동시 요청 몰림 방지)
  let requestQueue = Promise.resolve();
  function enqueue(fn) {
    requestQueue = requestQueue.then(() =>
      new Promise(resolve => setTimeout(resolve, 500)) // 요청 간 0.5초 간격
        .then(fn)
    );
    return requestQueue;
  }
  const need    = document.getElementById('inp-need').value.trim();
  const courses = `구약통독1(모세오경, 시가서), 구약통독1(시가서:아가), 큐티학교 2025-1학기, 십계명 2022-2, 십계명 2023-2,
  느헤미야 기도자학교 제6기, 책별성경공부(요한계시록) 2021-1, 신약성경 기도묵상 2022-1, 신약성경 기도묵상 2024-2,
  하사람연습 2025 2, 하사람연습 2026 1, 일대일 제자훈련 동반자반 제9기`.trim();
  const unComcourses = `산상수훈 2021-2`.trim();
  //일대일 제자훈련 양육자반 제2기, 
  
  if (!courses) { showError('이수한 과정을 입력해 주세요. (없으면 "없음" 입력)'); return; }

  // ── 제N기 표기 과정 제외 목록 계산 (정규식 없음) ──────────────
  function hasKiPostfix(raw) {
    // "제N기" 로 끝나는지 확인 - 문자 단위 탐색
    // "느헤미야 기도자학교 제6기" → true
    // "큐티학교 2025-1학기" → false
    var s = raw.trim();
    var kiIdx = s.lastIndexOf('기');
    if (kiIdx !== s.length - 1) return false; // 마지막 글자가 '기' 아님
    var jeIdx = s.lastIndexOf('제', kiIdx);
    if (jeIdx === -1) return false;            // '제' 없음
    var between = s.slice(jeIdx + 1, kiIdx).trim();
    if (between.length === 0) return false;
    for (var k = 0; k < between.length; k++) {
      var code = between.charCodeAt(k);
      if (code < 48 || code > 57) return false; // 숫자 아닌 문자 포함
    }
    return true; // "제[숫자]기" 패턴 확인
  }

  function removeKiPostfix(raw) {
    // "느헤미야 기도자학교 제6기" → "느헤미야 기도자학교"
    var s = raw.trim();
    var kiIdx = s.lastIndexOf('기');
    var jeIdx = s.lastIndexOf('제', kiIdx);
    return s.slice(0, jeIdx).trim();
  }

  // 이수 과정 중 "제N기" 표기가 있는 과정만 추출
  var completedList = courses.split(',').map(function(c){ return c.trim(); }).filter(Boolean);
  var bannedCourses = []; // 추천 금지 과정명 (기수 제거 후)
  var bannedRaw = [];     // 원본 (표시용)
  completedList.forEach(function(raw) {
    if (hasKiPostfix(raw)) {
      var base = removeKiPostfix(raw);
      if (base && bannedCourses.indexOf(base) === -1) {
        bannedCourses.push(base);
        bannedRaw.push(raw);
      }
    }
  });


  // ── 결과 영역 즉시 노출 ──────────────────────────────────────
  const resultArea  = document.getElementById('result-area');
  const resultBody  = document.getElementById('result-body');
  const resultTitle = document.getElementById('result-title');

  resultTitle.textContent = '맞춤 훈련 추천 결과';

  // ① 이수 과정 즉시 표시
  resultBody.innerHTML = `
    <div style="
      background:#f0f7ff;
      border-left:3px solid #4a90d9;
      border-radius:0 8px 8px 0;
      padding:12px 14px;
      margin-bottom:16px;
    ">
      <p style="font-size:12px;font-weight:700;color:#4a90d9;margin:0 0 4px">✅ 이수 완료 과정</p>
      <p style="font-size:13px;color:#444;line-height:1.8;margin:0 0 20px">
        ${courses.split(',').map(c => c.trim()).filter(Boolean).join(' &nbsp;·&nbsp; ')}
      </p>
	  
	  <p style="font-size:12px;font-weight:700;color:#4a90d9;margin:0 0 4px">✅ 미이수 과정</p>
      <p style="font-size:13px;color:#444;line-height:1.8;margin:0">
        ${unComcourses.split(',').map(c => c.trim()).filter(Boolean).join(' &nbsp;·&nbsp; ')}
      </p>
    </div>
    <div id="streaming-content" style="font-size:14px;color:#333;line-height:1.9;min-height:20px">
      <span style="color:#aaa;font-size:13px">✦ AI가 추천을 생성하고 있습니다. 꼼꼼히 검토하고 있어서 시간이 조금 걸릴 수 있습니다.</span>
    </div>`;

  resultArea.style.display = 'block';
  resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // ── 버튼 비활성화 ────────────────────────────────────────────
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> AI가 추천 중입니다...';

  // bannedCourses 를 프롬프트 맨 앞에 강하게 명시
  const bannedBlock = bannedCourses.length > 0
    ? bannedCourses.map(function(c){ return '  - ' + c; }).join('\n')
    : '  (없음)';

  // [절대 추천 금지 규칙 (최우선 준수 사항)]
  // 1. '이수한 과정' 리스트에 포함된 훈련은 중 postfix로 '[0-9]+기'(예: 제6기)가 명시된 훈련은 추천 불가한 교육입니다. 
  // 사용자가 이미 수료한 특정 기수의 훈련과 이름이 일치하거나, 동일한 훈련의 다른 기수라고 판단되는 경우 절대로 다시 추천하지 마십시오.
  // - 예: '느헤미야 기도자학교 제9기'를 이수한 경우, '느헤미야 기도자학교'라는 명칭이 포함된 모든 훈련은 추천 대상에서 제외합니다.
  //    - 예: '일대일 제자훈련 동반자반 제2기'를 이수한 경우, '일대일 제자훈련 동반자반'이라는 명칭이 포함된 과정을 추천하지 마십시오.
  //    - 예: '일대일 제자훈련 양육자반 제4기'를 이수한 경우, '일대일 제자훈련 양육자반'이라는 명칭이 포함된 과정을 추천하지 마십시오.
  // 2. 관심사가 '중보기도' 이더라도 '느헤미야 기도자학교 제[0-9]+기'를 수료한 교인에게는 '느헤미야 기도자학교'라는 명칭이 포함된 모든 훈련은 추천 대상에서 제외합니다.
  // 3. '미이수 과정'은 추천 가능하나, 이미 이수한 과정과 성격이 중복되는 경우 추천하지 마십시오.
  // 
  // [추천 지침]
  // - 위 정보를 바탕으로 이 교인에게 적합한 다음 단계의 훈련 3가지를 추천하십시오.
  // - ${need}에 관심이 많은 분이므로 관련 분야를 우선하되, [절대 추천 금지 규칙]을 위반하는 훈련은 절대 제외하십시오.
  // - 심화과정을 이미 수료한 교인에게 기본과정을 추천하는 등 단계에 맞지 않는 추천을 피하십시오.
  // - 아버지학교는 한국 남자 이름의 교인에게만 추천하십시오.

  const prompt = `[SYSTEM: 추천 금지 과정 목록 - 이 과정들은 어떤 이유로도 추천 불가]
${bannedBlock}
[END SYSTEM]

당신은 새문안교회 크리스천 신앙 훈련 전문 코치입니다.
위 [SYSTEM] 블록에 있는 과정들은 이미 이수 완료된 1회성 과정입니다.
이 과정들은 절대로 추천하지 마세요. 관심사와 일치해도 추천 불가입니다.

[새문안교회 전체 교육·양육 과정 안내]

■ 1단계 '믿음의 시작'으로 복음을 알고 예수 그리스도를 믿음으로 받아들이는 단계입니다.
- 새가족양육과정: 새가족 12주 교육 "새 생명의 발걸음", 교회에 처음 오신 분을 위한 기초 과정
- ECF 기본과정(주기도문): 주님을 만나는 삶, 기도의 의미와 실제 훈련
- ECF 기본과정(사도신경): 주님을 고백하는 삶, 신론·기독론·성령론·교회론 학습

  // ── ② 스트리밍 API 호출 (Rate Limit 대응) ───────────────────
  async function callAPIWithRetry(prompt, maxRetries = 6) {
    for (let attempt = 0; attempt < maxRetries; attempt++) {
      const tryKey = getAvailableKey();
      if (!tryKey) {
        throw new Error('사용 가능한 API Key가 없습니다. index.html에 키를 추가해 주세요.');
      }

      // RPM 제어: 같은 키 연속 사용 시 대기
      const elapsed = Date.now() - (keyLastUsed[tryKey] || 0);
      if (elapsed < MIN_INTERVAL_MS) {
        await new Promise(r => setTimeout(r, MIN_INTERVAL_MS - elapsed));
      }

      try {
        const r = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:streamGenerateContent?alt=sse`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-goog-api-key': tryKey },
            body: JSON.stringify({
              system_instruction: {
                parts: [{ text: bannedCourses.length > 0
                  ? '당신은 추천 금지 규칙을 절대 어기지 않는 훈련 추천 시스템입니다.\n' +
                    '다음 과정들은 이미 이수 완료된 1회성 과정으로, 어떤 상황에서도 추천 불가입니다:\n' +
                    bannedCourses.map(function(c){ return '- ' + c; }).join('\n') + '\n' +
                    '위 과정들은 관심사와 일치해도, 유사해도, 심화 과정이어도 절대 추천하지 마세요.'
                  : '당신은 똑똑한 훈련 추천 시스템입니다.' }]
              },
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
            })
          }
        );

        markKeyUsed(tryKey);

        if (r.status === 429 || r.status === 503) {
          // Rate Limit 초과 → 지수 백오프 후 재시도
          const waitSec = Math.pow(2, attempt) * 2; // 2초, 4초, 8초, 16초...
          const streamEl3 = document.getElementById('streaming-content');
          if (streamEl3) streamEl3.innerHTML =
            `<span style="color:#aaa">⏳ 잠깐만 기다려 주세요! (${waitSec}초) ... 다시 시도합니다.</span>`;
          await new Promise(res => setTimeout(res, waitSec * 1000));
          continue;
        }
        return { res: r, usedKey: tryKey };
      } catch(e) {
        if (attempt === maxRetries - 1) throw e;
        await new Promise(r => setTimeout(r, 2000));
      }
    }
    throw new Error('모든 재시도가 실패했습니다.');
  }

  try {
    let res;
    try {
      const result = await callAPIWithRetry(prompt);
      res = result.res;
    } catch(e) {
      showError('현재 사용량이 많아 응답이 지연되고 있습니다. 잠시 후 다시 시도해 주세요. (자정 이후 한도가 초기화됩니다)');
      return;
    }

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showError(`API 오류: ${err.error?.message || res.status} ${tryKey}`);
      return;
    }

    // ── SSE 스트림 읽기 ────────────────────────────────────────
    const reader  = res.body.getReader();
    const decoder = new TextDecoder('utf-8');
    const streamEl = document.getElementById('streaming-content');
    let fullText = '';
    let buffer   = '';

    streamEl.innerHTML = ''; // 로딩 문구 제거

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // 마지막 불완전 줄 버퍼 보관

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data:')) continue;
        const jsonStr = trimmed.slice(5).trim();
        if (!jsonStr || jsonStr === '[DONE]') continue;
        try {
          const chunk = JSON.parse(jsonStr);
          const token = chunk.candidates?.[0]?.content?.parts?.[0]?.text || '';
          if (token) {
            fullText += token;
            // 실시간 렌더링 (bold 처리 + 줄바꿈)
            streamEl.innerHTML = fullText
              .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
              .replace(/\n/g, '<br>');
          }
        } catch (_) { /* JSON 파싱 오류 무시 */ }
      }
    }

    // ── ③ 완료 후 블록 포맷 적용 ────────────────────────────────
    streamEl.innerHTML = formatResult(fullText);

  } catch (e) {
    const msg = e?.message || String(e);
    if (msg.includes('429') || msg.includes('RESOURCE_EXHAUSTED')) {
      showError('API 사용량 한도 초과입니다. 잠시 후 다시 시도해 주세요. (429)'+ tryKey);
    } else if (msg.includes('401') || msg.includes('API_KEY_INVALID')) {
      showError('API 키 인증 오류입니다. 키를 확인해 주세요. (401)'+ tryKey);
    } else if (msg.includes('403') || msg.includes('denied')) {
      showError('API 접근이 차단되었습니다. 키 또는 프로젝트 설정을 확인해 주세요. (403)'+ tryKey);
    } else if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
      showError('네트워크 오류입니다. 인터넷 연결을 확인해 주세요.');
    } else {
      showError('오류가 발생했습니다: ' + msg + ' ' + tryKey);
    }
    console.error('[recommend] error:', e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ 맞춤 훈련 추천받기';
  }
}
